name: Smoke-test release secrets

# Read-only validation that PYPI_API_TOKEN and HF_TOKEN are present and authenticate
# against PyPI and HuggingFace. Does NOT upload, publish, or modify anything.
# Manual trigger only — delete this workflow once release.yml is in place.

on:
  workflow_dispatch:

jobs:
  check-tokens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          pip install twine huggingface_hub

      - name: Verify PYPI_API_TOKEN is set
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error::PYPI_API_TOKEN secret is empty or missing"
            exit 1
          fi
          # PyPI tokens always start with 'pypi-'
          if [[ "$PYPI_API_TOKEN" != pypi-* ]]; then
            echo "::error::PYPI_API_TOKEN does not start with 'pypi-' — wrong value pasted?"
            exit 1
          fi
          echo "✓ PYPI_API_TOKEN present, format looks correct (pypi-... prefix)"

      - name: Verify HF_TOKEN authenticates against HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is empty or missing"
            exit 1
          fi
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          info = api.whoami()
          print(f"✓ HF_TOKEN authenticates as: {info['name']} (type={info['type']})")
          # Check write scope by inspecting auth info
          auth = info.get("auth", {})
          access_token = auth.get("accessToken", {})
          role = access_token.get("role")
          print(f"  token role: {role}")
          if role not in ("write", "fineGrained", None):
              print(f"::warning::Token role is {role!r} — write access not confirmed")
          PY

      - name: Summary
        run: |
          echo "Both tokens look good. Safe to add release.yml when ready."
