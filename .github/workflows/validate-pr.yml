name: Validate PR

# Runs on every PR (and pushes to main as a backstop). Catches broken
# manifests and code regressions before they hit a release tag.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,publish]"

      - name: Validate bundled manifest
        run: admesh-domains validate

      - name: Validate dev manifest (with mesh files)
        run: admesh-domains validate registry_data/manifest.toml

      - name: Run test suite (with coverage)
        # See docs/TEST-AUDIT.md §2.3 [M1] — pytest-cov declared in deps
        # but previously not invoked. Now measured per-PR.
        run: pytest tests/ -v --cov=admesh_domains --cov-report=term-missing

  publisher-dry-run:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install publish extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[publish]"

      - name: Dry-run publisher (no HF write)
        run: |
          admesh-domains publish \
            --tag v0.0.0-dryrun \
            --manifest registry_data/manifest.toml \
            --dry-run \
            --verbose
