# ADMESH Domain Registry Manifest
# Two-level model: Domain -> Meshes (one mesh per .14 file)

schema_version = "0.2"

[metadata]
version = "1.0.0"
description = "ADCIRC mesh domain registry"
created = "2026-04-25"
source_repositories = [
    "https://github.com/domattioli/CHILmesh",
    "https://github.com/domattioli/QuADMesh-MATLAB",
    "https://github.com/domattioli/chil_mesh-master",
]
total_domains = 13
total_meshes = 40
total_size_mb = 59.0

# Domain: Baranja Hill
[[domains]]
name = "BaranjaHill"
full_name = "Baranja Hill"
category = "real-world"
region = "Europe"
applications = ["Coastal Circulation"]

[[domains.meshes]]
id = "default@v1"
filename = "Baranja_Hill.14"
description = "Baranja Hill region mesh"
size_mb = 0.08

[[domains.meshes]]
id = "admesh-v2@v1"
filename = "Baranja_Hill_ADMESH_v2.14"
