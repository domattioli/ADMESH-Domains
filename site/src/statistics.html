<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Statistics — ADMESH-Domains</title>
  <meta name="description" content="Aggregate statistics, top meshes, contributor breakdown, and license/application coverage for the ADMESH-Domains registry." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="site-header"></header>
  <main>
    <h1>Registry statistics</h1>
    <p class="muted">Aggregates and superlatives, computed in your browser from the live registry manifest.</p>

    <section class="totals" aria-label="Totals">
      <div class="stat"><span class="num" id="t-domains">—</span><span class="label">Domains</span></div>
      <div class="stat"><span class="num" id="t-meshes">—</span><span class="label">Meshes</span></div>
      <div class="stat"><span class="num" id="t-bytes">—</span><span class="label">Total MB</span></div>
      <div class="stat"><span class="num" id="t-nodes">—</span><span class="label">Total nodes</span></div>
      <div class="stat"><span class="num" id="t-contribs">—</span><span class="label">Contributors</span></div>
    </section>

    <h2>Top 5 by node count</h2>
    <div id="top-nodes" class="stat-section"></div>

    <h2>Top 5 by element count</h2>
    <div id="top-elements" class="stat-section"></div>

    <h2>Top 5 by file size</h2>
    <div id="top-size" class="stat-section"></div>

    <h2>Refinement levels</h2>
    <div id="refinement-chart" class="chart"></div>

    <h2>Licenses</h2>
    <div id="license-chart" class="chart"></div>

    <h2>Applications</h2>
    <div id="application-chart" class="chart"></div>

    <h2>Contributors</h2>
    <div id="contributors" class="stat-section"></div>
  </main>
  <footer id="site-footer"></footer>
  <script type="module" src="js/statistics.js"></script>
</body>
</html>
